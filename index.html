<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>無限 Wordle</title>
    <style>
        :root {
            --bg-color: #121213;
            --text-color: #ffffff;
            --border-color: #3a3a3c;
            --empty-bg: #121213;
            --filled-border: #565758;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --key-bg: #818384;
            --key-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation; /* 避免手機快速點擊時畫面突然放大 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* 解決手機瀏覽器網址列遮擋底部的問題 */
            width: 100vw;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* 遊戲區域，設定可捲動以支援無限行數 */
        #game-container {
            display: flex;
            justify-content: center;
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 10px;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            height: fit-content;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid var(--border-color);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.25s ease-in-out, background-color 0s, border-color 0s;
        }

        @media (max-width: 400px) {
            .tile {
                width: 14vw;
                height: 14vw;
                font-size: 1.5rem;
            }
            .key {
                height: 45px !important;
                font-size: 1rem !important;
            }
            .key.large {
                font-size: 0.75rem !important;
            }
            .key.backspace {
                font-size: 1.2rem !important; /* 手機版放大刪除鍵 */
            }
        }

        /* 狀態顏色 */
        .tile.filled { border-color: var(--filled-border); }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); }
        .tile.present { background-color: var(--present); border-color: var(--present); }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); }

        /* 動畫 */
        .tile.flip-in { transform: rotateX(90deg); }
        .tile.pop { animation: pop 0.1s; }

        @keyframes pop {
            0% { transform: scale(0.8); }
            40% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .row.shake { animation: shake 0.5s; }
        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); }
            40%, 60% { transform: translateX(6px); }
        }

        /* 虛擬鍵盤 */
        #keyboard {
            width: 100%;
            max-width: 500px; /* 限制在大螢幕的最大寬度 */
            margin: 0 auto 10px auto; /* 置中 */
            padding: 5px 8px; /* 縮小邊距 */
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px; /* 縮小按鍵間距，讓窄螢幕也能塞下 10 個鍵 */
            width: 100%;
        }

        .key {
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            height: 52px; /* 稍微降低高度，避免手機螢幕太小被擠壓 */
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            flex: 1; /* 讓按鍵自動填滿，拿掉原來的 max-width */
            padding: 0;
            user-select: none;
            transition: background-color 0.2s;
        }

        .key.large { 
            flex: 1.5; 
            font-size: 0.85rem; 
        }
        .key.backspace {
            font-size: 1.6rem; /* 電腦版大幅放大刪除鍵圖示 */
        }
        .key.correct { background-color: var(--correct); }
        .key.present { background-color: var(--present); }
        .key.absent { background-color: var(--absent); }

        /* 訊息吐司 (Toast) */
        #toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #000000;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        #toast.show { opacity: 1; }

        /* 結束彈窗 (Modal) */
        #modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
        }

        .modal-content h2 { margin-bottom: 15px; font-size: 24px; }
        .modal-content p { font-size: 18px; margin-bottom: 15px; color: #ddd; }
        .modal-content .highlight { color: var(--correct); font-size: 28px; font-weight: bold; }
        
        #correct-word { color: white; font-weight: bold; font-size: 20px; letter-spacing: 2px; }
        #word-meaning { margin-bottom: 25px; min-height: 24px; }
        
        /* 新增：詞性標籤的樣式 */
        .pos-badge { 
            background-color: #5dade2; 
            color: #121213; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 13px; 
            font-weight: bold; 
            margin-right: 8px; 
            vertical-align: middle; 
        }

        button.play-again {
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: filter 0.2s;
            width: 100%;
        }

        // 取得中文翻譯與詞性 (全新升級版)
        async function fetchWordMeaning(word) {
            const meaningEl = document.getElementById('word-meaning');
            meaningEl.innerHTML = '<span style="color:#888; font-size:14px;">正在查詢字典與翻譯...</span>';
            
            try {
                // 1. 先從字典 API 拿詞性與英文解釋
                let partOfSpeech = "";
                let enDef = "";
                
                try {
                    const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    if (dictRes.ok) {
                        const dictData = await dictRes.json();
                        const meaning = dictData[0].meanings[0];
                        partOfSpeech = meaning.partOfSpeech;
                        enDef = meaning.definitions[0].definition;
                    }
                } catch(e) { console.warn("字典詳情獲取失敗", e); }

                // 詞性翻譯對照表
                const posMap = {
                    "noun": "名詞", "verb": "動詞", "adjective": "形容詞", "adverb": "副詞",
                    "pronoun": "代名詞", "preposition": "介詞", "conjunction": "連接詞", "interjection": "感嘆詞"
                };
                let posZh = partOfSpeech ? (posMap[partOfSpeech.toLowerCase()] || partOfSpeech) : "";

                // 2. 翻譯單字本身
                let zhWord = "";
                try {
                    const wordRes = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|zh-TW`);
                    const wordData = await wordRes.json();
                    if (wordData?.responseData?.translatedText) {
                        let text = wordData.responseData.translatedText;
                        // 避免 API 直接回傳英文原字
                        if (text.toLowerCase() !== word.toLowerCase()) {
                            zhWord = text;
                        }
                    }
                } catch(e) { console.warn("單字翻譯失敗", e); }

                // 3. 翻譯英文解釋句子
                let zhDef = "";
                if (enDef) {
                    try {
                        const defRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(enDef)}&langpair=en|zh-TW`);
                        const defData = await defRes.json();
                        if (defData?.responseData?.translatedText) {
                            zhDef = defData.responseData.translatedText;
                        }
                    } catch(e) { console.warn("解釋翻譯失敗", e); }
                }

                // 4. 組合 HTML 呈現結果
                let finalHTML = "";
                
                // 顯示詞性與單字簡譯
                if (posZh || zhWord) {
                    finalHTML += `<div style="margin-bottom: 10px; margin-top: 10px;">`;
                    if (posZh) finalHTML += `<span class="pos-badge">${posZh}</span>`;
                    if (zhWord) finalHTML += `<span style="font-weight: bold; font-size: 18px; color: #fff; vertical-align: middle;">${zhWord}</span>`;
                    finalHTML += `</div>`;
                }

                // 顯示整段詳細解釋
                if (zhDef) {
                    finalHTML += `<div style="font-size: 15px; color: #ccc; text-align: left; background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; line-height: 1.5;">💡 ${zhDef}</div>`;
                } else if (enDef) {
                    // 如果翻譯失敗，至少給英文解釋
                    finalHTML += `<div style="font-size: 15px; color: #ccc; text-align: left; background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px; line-height: 1.5;">💡 ${enDef}</div>`;
                }

                if (!finalHTML) {
                    meaningEl.innerHTML = '<span style="color:#888; font-size:14px;">(找不到這個單字的詳細解釋)</span>';
                } else {
                    meaningEl.innerHTML = finalHTML;
                }

            } catch (error) {
                console.error("整體翻譯流程失敗", error);
                meaningEl.innerHTML = '<span style="color:#e74c3c; font-size:14px;">(無法連線取得解釋)</span>';
            }
        }

        // 初始化遊戲
        async function initGame() {
            isLoading = true;
            modalEl.classList.remove('show');
            showToast('正在尋找新單字...');
            
            targetWord = await fetchRandomWord();
            console.log("偷偷告訴你，答案是:", targetWord); // 除錯用

            isLoading = false;
            currentRow = 0;
            currentCol = 0;
            guesses = [[]];
            gameOver = false;
            isAnimating = false;
            keyColors = {};
            
            boardEl.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                createRow();
            }

            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('correct', 'present', 'absent');
            });
        }

        // 建立新的一行
        function createRow() {
            const rowEl = document.createElement('div');
            rowEl.className = 'row';
            rowEl.id = `row-${boardEl.children.length}`;
            for (let i = 0; i < 5; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${boardEl.children.length}-${i}`;
                rowEl.appendChild(tile);
            }
            boardEl.appendChild(rowEl);
        }

        // 處理按鍵輸入
        function handleKey(key) {
            if (gameOver || isAnimating || isLoading) return;

            if (key === 'ENTER') {
                submitGuess();
            } else if (key === '⌫' || key === 'BACKSPACE') {
                removeLetter();
            } else if (/^[A-Z]$/.test(key)) {
                addLetter(key);
            }
        }

        // 實體鍵盤監聽
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            let key = e.key.toUpperCase();
            if (key === 'BACKSPACE') handleKey('⌫');
            else if (key === 'ENTER') handleKey('ENTER');
            else if (/^[A-Z]$/.test(key)) handleKey(key);
        });

        function addLetter(letter) {
            if (currentCol < 5) {
                guesses[currentRow].push(letter);
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.textContent = letter;
                tile.classList.add('filled', 'pop');
                setTimeout(() => tile.classList.remove('pop'), 100);
                currentCol++;
            }
        }

        function removeLetter() {
            if (currentCol > 0) {
                currentCol--;
                guesses[currentRow].pop();
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.textContent = '';
                tile.classList.remove('filled');
            }
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        async function submitGuess() {
            if (currentCol !== 5) {
                showToast('字母數量不足！');
                document.getElementById(`row-${currentRow}`).classList.add('shake');
                setTimeout(() => document.getElementById(`row-${currentRow}`).classList.remove('shake'), 500);
                return;
            }

            const currentGuess = guesses[currentRow].join('');
            
            // 【防呆機制】：如果猜的剛好是正確答案，或是內建常見單字，直接放行不查字典！
            if (currentGuess !== targetWord && !wordList.includes(currentGuess)) {
                isLoading = true;
                try {
                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${currentGuess}`);
                    if (!response.ok) {
                        showToast('查無此字！');
                        document.getElementById(`row-${currentRow}`).classList.add('shake');
                        setTimeout(() => document.getElementById(`row-${currentRow}`).classList.remove('shake'), 500);
                        isLoading = false;
                        return;
                    }
                } catch (error) {
                    console.warn("字典 API 連線失敗，跳過驗證放行");
                }
                isLoading = false;
            }

            checkResult(currentGuess);
        }

        function checkResult(guess) {
            isAnimating = true;
            let targetArr = targetWord.split('');
            let guessArr = guess.split('');
            let tileColors = Array(5).fill('absent');
            
            let targetLetterCount = {};
            targetArr.forEach(char => {
                targetLetterCount[char] = (targetLetterCount[char] || 0) + 1;
            });

            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    tileColors[i] = 'correct';
                    targetLetterCount[guessArr[i]] -= 1;
                }
            }

            for (let i = 0; i < 5; i++) {
                if (tileColors[i] === 'correct') continue;
                if (targetLetterCount[guessArr[i]] > 0) {
                    tileColors[i] = 'present';
                    targetLetterCount[guessArr[i]] -= 1;
                }
            }

            const rowEl = document.getElementById(`row-${currentRow}`);
            const tiles = rowEl.children;

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    tiles[i].classList.add('flip-in');
                    
                    setTimeout(() => {
                        tiles[i].classList.remove('flip-in');
                        tiles[i].classList.add(tileColors[i]);
                        
                        let keyBtn = document.querySelector(`.key[data-key="${guessArr[i]}"]`);
                        if (keyBtn) {
                            let currentColor = keyColors[guessArr[i]];
                            if (currentColor !== 'correct') {
                                if (tileColors[i] === 'correct') {
                                    keyColors[guessArr[i]] = 'correct';
                                } else if (tileColors[i] === 'present' && currentColor !== 'present') {
                                    keyColors[guessArr[i]] = 'present';
                                } else if (tileColors[i] === 'absent' && currentColor !== 'present' && currentColor !== 'correct') {
                                    keyColors[guessArr[i]] = 'absent';
                                }
                                keyBtn.className = `key ${keyColors[guessArr[i]]}`;
                                if (guessArr[i] === 'ENTER' || guessArr[i] === '⌫') {
                                    keyBtn.classList.add('large');
                                    if (guessArr[i] === '⌫') keyBtn.classList.add('backspace');
                                }
                            }
                        }

                        if (i === 4) {
                            setTimeout(() => finishRow(guess), 200);
                        }
                    }, 125);
                }, i * 300);
            }
        }

        function finishRow(guess) {
            isAnimating = false;

            if (guess === targetWord) {
                gameOver = true;
                document.getElementById('guess-count').textContent = currentRow + 1;
                document.getElementById('correct-word').textContent = targetWord;
                
                // 【新增】：重置翻譯文字並開始抓取中文解釋
                document.getElementById('word-meaning').textContent = '正在查詢中文解釋...';
                fetchWordMeaning(targetWord);

                setTimeout(() => modalEl.classList.add('show'), 500);
            } else {
                currentRow++;
                currentCol = 0;
                guesses.push([]);
                
                if (currentRow >= boardEl.children.length) {
                    createRow();
                    setTimeout(() => {
                        gameContainerEl.scrollTop = gameContainerEl.scrollHeight;
                    }, 100);
                }
            }
        }

        // 啟動遊戲
        initKeyboard();
        initGame();
    </script>
</body>
</html>
