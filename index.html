<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>無限 Wordle</title>
    <style>
        :root {
            --bg-color: #121213;
            --text-color: #ffffff;
            --border-color: #3a3a3c;
            --empty-bg: #121213;
            --filled-border: #565758;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --key-bg: #818384;
            --key-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation; /* 避免手機快速點擊時畫面突然放大 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* 解決手機瀏覽器網址列遮擋底部的問題 */
            width: 100vw;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* 遊戲區域，設定可捲動以支援無限行數 */
        #game-container {
            display: flex;
            justify-content: center;
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 10px;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            height: fit-content;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid var(--border-color);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.25s ease-in-out, background-color 0s, border-color 0s;
        }

        @media (max-width: 400px) {
            .tile {
                width: 14vw;
                height: 14vw;
                font-size: 1.5rem;
            }
            .key {
                height: 45px !important;
                font-size: 1rem !important;
            }
            .key.large {
                font-size: 0.75rem !important;
            }
            .key.backspace {
                font-size: 1.2rem !important; /* 手機版放大刪除鍵 */
            }
        }

        /* 狀態顏色 */
        .tile.filled { border-color: var(--filled-border); }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); }
        .tile.present { background-color: var(--present); border-color: var(--present); }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); }

        /* 動畫 */
        .tile.flip-in { transform: rotateX(90deg); }
        .tile.pop { animation: pop 0.1s; }

        @keyframes pop {
            0% { transform: scale(0.8); }
            40% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .row.shake { animation: shake 0.5s; }
        @keyframes shake {
            10%, 90% { transform: translateX(-2px); }
            20%, 80% { transform: translateX(4px); }
            30%, 50%, 70% { transform: translateX(-6px); }
            40%, 60% { transform: translateX(6px); }
        }

        /* 虛擬鍵盤 */
        #keyboard {
            width: 100%;
            max-width: 500px; /* 限制在大螢幕的最大寬度 */
            margin: 0 auto 10px auto; /* 置中 */
            padding: 5px 8px; /* 縮小邊距 */
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px; /* 縮小按鍵間距，讓窄螢幕也能塞下 10 個鍵 */
            width: 100%;
        }

        .key {
            background-color: var(--key-bg);
            color: var(--key-text);
            border: none;
            border-radius: 4px;
            height: 52px; /* 稍微降低高度，避免手機螢幕太小被擠壓 */
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            flex: 1; /* 讓按鍵自動填滿，拿掉原來的 max-width */
            padding: 0;
            user-select: none;
            transition: background-color 0.2s;
        }

        .key.large { 
            flex: 1.5; 
            font-size: 0.85rem; 
        }
        .key.backspace {
            font-size: 1.6rem; /* 電腦版大幅放大刪除鍵圖示 */
        }
        .key.correct { background-color: var(--correct); }
        .key.present { background-color: var(--present); }
        .key.absent { background-color: var(--absent); }

        /* 訊息吐司 (Toast) */
        #toast {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #000000;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        #toast.show { opacity: 1; }

        /* 結束彈窗 (Modal) */
        #modal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 350px;
        }

        .modal-content h2 { margin-bottom: 15px; font-size: 24px; }
        .modal-content p { font-size: 18px; margin-bottom: 15px; color: #ddd; }
        .modal-content .highlight { color: var(--correct); font-size: 28px; font-weight: bold; }
        
        #correct-word { color: white; font-weight: bold; font-size: 20px; letter-spacing: 2px; }
        #word-meaning { color: #5dade2; font-size: 16px; font-weight: bold; margin-bottom: 25px; min-height: 24px; }

        button.play-again {
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: filter 0.2s;
            width: 100%;
        }

        button.play-again:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

    <header>無限 WORDLE</header>

    <div id="toast">訊息</div>

    <div id="game-container">
        <div id="board">
            <!-- JavaScript 會動態產生行數 -->
        </div>
    </div>

    <div id="keyboard">
        <!-- JavaScript 會動態產生鍵盤 -->
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">恭喜過關！</h2>
            <p id="modal-desc">你總共猜了 <span class="highlight" id="guess-count">0</span> 次。</p>
            <p style="font-size: 14px; color: #888; margin-bottom: 5px;">正確答案：<span id="correct-word"></span></p>
            <p id="word-meaning">正在查詢中文解釋...</p> <!-- 新增中文翻譯區塊 -->
            <button class="play-again" onclick="initGame()">再來一局</button>
        </div>
    </div>

    <script>
        // 內建備用單字庫 (當無網路或 API 壞掉時的備案)
        const wordList = [
            "APPLE", "TRAIN", "HOUSE", "WATER", "TIGER", "PLANT", "EARTH", "MONEY", "TABLE", "CHAIR",
            "LIGHT", "NIGHT", "DREAM", "HEART", "MUSIC", "WORLD", "RIVER", "STONE", "FRUIT", "BREAD",
            "GHOST", "SMILE", "MOUSE", "CLOCK", "PAPER", "PENNY", "SWEET", "STORY", "MAGIC", "POWER",
            "SPACE", "STARS", "CLOUD", "STORM", "BEACH", "OCEAN", "GLASS", "WATCH", "BOARD", "FRAME"
        ];

        let targetWord = "";
        let currentRow = 0;
        let currentCol = 0;
        let guesses = [];
        let gameOver = false;
        let isAnimating = false;
        let isLoading = false;
        let keyColors = {};

        const keyboardLayout = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
        ];

        const boardEl = document.getElementById('board');
        const keyboardEl = document.getElementById('keyboard');
        const gameContainerEl = document.getElementById('game-container');
        const toastEl = document.getElementById('toast');
        const modalEl = document.getElementById('modal');

        // 初始化鍵盤 DOM
        function initKeyboard() {
            keyboardEl.innerHTML = '';
            keyboardLayout.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'keyboard-row';
                row.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    if (key === 'ENTER' || key === '⌫') btn.classList.add('large');
                    if (key === '⌫') btn.classList.add('backspace'); // 加入刪除鍵專屬 class
                    btn.textContent = key;
                    btn.setAttribute('data-key', key);
                    btn.onclick = () => handleKey(key);
                    rowEl.appendChild(btn);
                });
                keyboardEl.appendChild(rowEl);
            });
        }

        // 從 API 獲取隨機單字
        async function fetchRandomWord() {
            try {
                const response = await fetch('https://random-word-api.herokuapp.com/word?length=5');
                const data = await response.json();
                return data[0].toUpperCase();
            } catch (error) {
                console.error("獲取單字失敗，使用備用單字", error);
                return wordList[Math.floor(Math.random() * wordList.length)];
            }
        }

        // 取得中文翻譯 (新增功能)
        async function fetchWordMeaning(word) {
            const meaningEl = document.getElementById('word-meaning');
            try {
                // 呼叫免費的英翻中 API (MyMemory)
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|zh-TW`);
                const data = await response.json();
                
                if (data && data.responseData && data.responseData.translatedText) {
                    meaningEl.textContent = `💡 意思：${data.responseData.translatedText}`;
                } else {
                    meaningEl.textContent = '(找不到中文解釋)';
                }
            } catch (error) {
                console.error("翻譯 API 失敗", error);
                meaningEl.textContent = '(無法連線取得解釋)';
            }
        }

        // 初始化遊戲
        async function initGame() {
            isLoading = true;
            modalEl.classList.remove('show');
            showToast('正在尋找新單字...');
            
            targetWord = await fetchRandomWord();
            console.log("偷偷告訴你，答案是:", targetWord); // 除錯用

            isLoading = false;
            currentRow = 0;
            currentCol = 0;
            guesses = [[]];
            gameOver = false;
            isAnimating = false;
            keyColors = {};
            
            boardEl.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                createRow();
            }

            document.querySelectorAll('.key').forEach(k => {
                k.classList.remove('correct', 'present', 'absent');
            });
        }

        // 建立新的一行
        function createRow() {
            const rowEl = document.createElement('div');
            rowEl.className = 'row';
            rowEl.id = `row-${boardEl.children.length}`;
            for (let i = 0; i < 5; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${boardEl.children.length}-${i}`;
                rowEl.appendChild(tile);
            }
            boardEl.appendChild(rowEl);
        }

        // 處理按鍵輸入
        function handleKey(key) {
            if (gameOver || isAnimating || isLoading) return;

            if (key === 'ENTER') {
                submitGuess();
            } else if (key === '⌫' || key === 'BACKSPACE') {
                removeLetter();
            } else if (/^[A-Z]$/.test(key)) {
                addLetter(key);
            }
        }

        // 實體鍵盤監聽
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            let key = e.key.toUpperCase();
            if (key === 'BACKSPACE') handleKey('⌫');
            else if (key === 'ENTER') handleKey('ENTER');
            else if (/^[A-Z]$/.test(key)) handleKey(key);
        });

        function addLetter(letter) {
            if (currentCol < 5) {
                guesses[currentRow].push(letter);
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.textContent = letter;
                tile.classList.add('filled', 'pop');
                setTimeout(() => tile.classList.remove('pop'), 100);
                currentCol++;
            }
        }

        function removeLetter() {
            if (currentCol > 0) {
                currentCol--;
                guesses[currentRow].pop();
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.textContent = '';
                tile.classList.remove('filled');
            }
        }

        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        async function submitGuess() {
            if (currentCol !== 5) {
                showToast('字母數量不足！');
                document.getElementById(`row-${currentRow}`).classList.add('shake');
                setTimeout(() => document.getElementById(`row-${currentRow}`).classList.remove('shake'), 500);
                return;
            }

            const currentGuess = guesses[currentRow].join('');
            
            // 【防呆機制】：如果猜的剛好是正確答案，或是內建常見單字，直接放行不查字典！
            if (currentGuess !== targetWord && !wordList.includes(currentGuess)) {
                isLoading = true;
                try {
                    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${currentGuess}`);
                    if (!response.ok) {
                        showToast('查無此字！');
                        document.getElementById(`row-${currentRow}`).classList.add('shake');
                        setTimeout(() => document.getElementById(`row-${currentRow}`).classList.remove('shake'), 500);
                        isLoading = false;
                        return;
                    }
                } catch (error) {
                    console.warn("字典 API 連線失敗，跳過驗證放行");
                }
                isLoading = false;
            }

            checkResult(currentGuess);
        }

        function checkResult(guess) {
            isAnimating = true;
            let targetArr = targetWord.split('');
            let guessArr = guess.split('');
            let tileColors = Array(5).fill('absent');
            
            let targetLetterCount = {};
            targetArr.forEach(char => {
                targetLetterCount[char] = (targetLetterCount[char] || 0) + 1;
            });

            for (let i = 0; i < 5; i++) {
                if (guessArr[i] === targetArr[i]) {
                    tileColors[i] = 'correct';
                    targetLetterCount[guessArr[i]] -= 1;
                }
            }

            for (let i = 0; i < 5; i++) {
                if (tileColors[i] === 'correct') continue;
                if (targetLetterCount[guessArr[i]] > 0) {
                    tileColors[i] = 'present';
                    targetLetterCount[guessArr[i]] -= 1;
                }
            }

            const rowEl = document.getElementById(`row-${currentRow}`);
            const tiles = rowEl.children;

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    tiles[i].classList.add('flip-in');
                    
                    setTimeout(() => {
                        tiles[i].classList.remove('flip-in');
                        tiles[i].classList.add(tileColors[i]);
                        
                        let keyBtn = document.querySelector(`.key[data-key="${guessArr[i]}"]`);
                        if (keyBtn) {
                            let currentColor = keyColors[guessArr[i]];
                            if (currentColor !== 'correct') {
                                if (tileColors[i] === 'correct') {
                                    keyColors[guessArr[i]] = 'correct';
                                } else if (tileColors[i] === 'present' && currentColor !== 'present') {
                                    keyColors[guessArr[i]] = 'present';
                                } else if (tileColors[i] === 'absent' && currentColor !== 'present' && currentColor !== 'correct') {
                                    keyColors[guessArr[i]] = 'absent';
                                }
                                keyBtn.className = `key ${keyColors[guessArr[i]]}`;
                                if (guessArr[i] === 'ENTER' || guessArr[i] === '⌫') {
                                    keyBtn.classList.add('large');
                                    if (guessArr[i] === '⌫') keyBtn.classList.add('backspace');
                                }
                            }
                        }

                        if (i === 4) {
                            setTimeout(() => finishRow(guess), 200);
                        }
                    }, 125);
                }, i * 300);
            }
        }

        function finishRow(guess) {
            isAnimating = false;

            if (guess === targetWord) {
                gameOver = true;
                document.getElementById('guess-count').textContent = currentRow + 1;
                document.getElementById('correct-word').textContent = targetWord;
                
                // 【新增】：重置翻譯文字並開始抓取中文解釋
                document.getElementById('word-meaning').textContent = '正在查詢中文解釋...';
                fetchWordMeaning(targetWord);

                setTimeout(() => modalEl.classList.add('show'), 500);
            } else {
                currentRow++;
                currentCol = 0;
                guesses.push([]);
                
                if (currentRow >= boardEl.children.length) {
                    createRow();
                    setTimeout(() => {
                        gameContainerEl.scrollTop = gameContainerEl.scrollHeight;
                    }, 100);
                }
            }
        }

        // 啟動遊戲
        initKeyboard();
        initGame();
    </script>
</body>
</html>
